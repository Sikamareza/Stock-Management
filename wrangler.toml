name = "stock-management"
main = "worker.js"
compatibility_date = "2024-09-25"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "auth-db"
database_id = "07b8dd2d-fa3d-4272-b457-c353801367c7"

# Cron Triggers for Notifications
[triggers]
crons = [
  "0 9 * * *",      # Daily at 9 AM
  "0 9 * * 1",      # Weekly on Monday at 9 AM
  "0 9 1,15 * *",   # 1st and 15th of month at 9 AM
  "0 9 1 * *"       # Monthly on 1st at 9 AM
]
